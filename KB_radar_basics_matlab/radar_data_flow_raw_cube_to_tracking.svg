<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="2450" viewBox="0 0 1500 2450">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-family: "Microsoft YaHei", Arial, Helvetica, sans-serif; font-size: 38px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: "Microsoft YaHei", Arial, Helvetica, sans-serif; font-size: 20px; fill: #475569; }
      .section { font-family: "Microsoft YaHei", Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 700; fill: #0f172a; }
      .block-title { font-family: "Microsoft YaHei", Arial, Helvetica, sans-serif; font-size: 25px; font-weight: 700; fill: #0f172a; }
      .block-small { font-family: "Microsoft YaHei", Arial, Helvetica, sans-serif; font-size: 16px; fill: #475569; }
      .data-title { font-family: "Microsoft YaHei", Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; fill: #0f172a; }
      .data { font-family: Consolas, "Cascadia Mono", monospace; font-size: 15px; fill: #334155; }
      .data-small { font-family: "Microsoft YaHei", Arial, Helvetica, sans-serif; font-size: 14px; fill: #475569; }
      .math { font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif; font-size: 16px; fill: #334155; }
      .math-super { font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif; font-size: 11px; fill: #334155; }
      .note { font-family: "Microsoft YaHei", Arial, Helvetica, sans-serif; font-size: 15px; fill: #334155; }
      .example { fill: #ffffff; stroke: #334155; stroke-width: 2.2; }
      .block { fill: #ffffff; stroke: #2563eb; stroke-width: 2.6; }
      .decision { fill: #ffffff; stroke: #dc2626; stroke-width: 2.6; }
      .tracking { fill: #ffffff; stroke: #4f46e5; stroke-width: 2.6; }
      .data-box { fill: #eef6ff; stroke: #94a3b8; stroke-width: 1.6; }
      .final-box { fill: #eef2ff; stroke: #818cf8; stroke-width: 1.8; }
      .arrow { stroke: #1f2937; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .axis { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.7; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="2450"/>

  <text class="title" x="750" y="62" text-anchor="middle">Radar Data Flow: Raw Cube 到 Tracking</text>
  <text class="subtitle" x="750" y="98" text-anchor="middle">Processing blocks are boxes; input/output data objects are labeled on the arrows</text>

  <rect class="example" x="120" y="130" width="1260" height="142" rx="10"/>
  <text class="section" x="150" y="165">Running example used throughout the chain</text>
  <text class="note" x="150" y="197">X-band LFM radar, B = 10 MHz, fs = 20 MHz, PRF = 10 kHz, fc = 10 GHz, Np = 128, ULA M = 16, d = lambda/2</text>
  <text class="data" x="150" y="225">Raw cube: x[k,n,m] <tspan class="math">∈ ℂ</tspan><tspan class="math-super" baseline-shift="super">1024×128×16</tspan>, axes = fast time × pulses × elements</text>
  <text class="data" x="150" y="252">Target A: R = 4.0 km, v = +30 m/s, theta = +20 deg    Target B: R = 6.5 km, v = -10 m/s, theta = -35 deg</text>

  <rect class="axis" x="120" y="300" width="1260" height="74" rx="10"/>
  <text class="section" x="150" y="330">Core tensor convention</text>
  <text class="data" x="150" y="356">x[fast time, slow time, array element]  ->  range, Doppler/velocity, angle</text>

  <!-- Data 0 -->
  <rect class="data-box" x="270" y="415" width="960" height="92" rx="10"/>
  <text class="data-title" x="750" y="445" text-anchor="middle">Input data to the chain</text>
  <text class="data" x="750" y="471" text-anchor="middle">raw data cube: x[k,n,m] <tspan class="math">∈ ℂ</tspan><tspan class="math-super" baseline-shift="super">1024×128×16</tspan></text>
  <text class="data-small" x="750" y="494" text-anchor="middle">complex ADC I/Q samples; delay, Doppler phase, spatial phase, noise, clutter, and impairments are still mixed</text>

  <path class="arrow" d="M 750 507 L 750 558"/>

  <!-- Block 1 -->
  <rect class="block" x="405" y="560" width="690" height="108" rx="10"/>
  <text class="block-title" x="750" y="598" text-anchor="middle">1. Calibration / Preprocessing</text>
  <text class="block-small" x="750" y="629" text-anchor="middle">timing alignment, DC removal, per-channel gain/phase correction</text>
  <text class="block-small" x="750" y="652" text-anchor="middle">Goal: make coherent range/Doppler/array processing meaningful</text>

  <path class="arrow" d="M 750 668 L 750 742"/>
  <rect class="data-box" x="270" y="695" width="960" height="78" rx="10"/>
  <text class="data-title" x="750" y="722" text-anchor="middle">Output / next input</text>
  <text class="data" x="750" y="748" text-anchor="middle">calibrated cube: x_cal[k,n,m] <tspan class="math">∈ ℂ</tspan><tspan class="math-super" baseline-shift="super">1024×128×16</tspan></text>
  <path class="arrow" d="M 750 773 L 750 813"/>

  <!-- Block 2 -->
  <rect class="block" x="405" y="815" width="690" height="108" rx="10"/>
  <text class="block-title" x="750" y="853" text-anchor="middle">2. Range Compression / Matched Filter</text>
  <text class="block-small" x="750" y="884" text-anchor="middle">process fast-time axis k using LFM replica h[k] = conj(flip(s[k]))</text>
  <text class="block-small" x="750" y="907" text-anchor="middle">Hold slow time n and array element m fixed while filtering</text>

  <path class="arrow" d="M 750 923 L 750 997"/>
  <rect class="data-box" x="270" y="950" width="960" height="88" rx="10"/>
  <text class="data-title" x="750" y="977" text-anchor="middle">Output / next input</text>
  <text class="data" x="750" y="1003" text-anchor="middle">range-compressed cube: y[r,n,m] <tspan class="math">∈ ℂ</tspan><tspan class="math-super" baseline-shift="super">1024×128×16</tspan>  (range bins × pulses × elements)</text>
  <text class="data-small" x="750" y="1025" text-anchor="middle">Example: peaks appear near 4.0 km and 6.5 km; nominal Delta R = c/(2B) approx 15 m</text>
  <path class="arrow" d="M 750 1038 L 750 1078"/>

  <!-- Block 3 -->
  <rect class="block" x="405" y="1080" width="690" height="108" rx="10"/>
  <text class="block-title" x="750" y="1118" text-anchor="middle">3. Doppler Processing</text>
  <text class="block-small" x="750" y="1149" text-anchor="middle">process slow-time axis n with windowing + Doppler FFT</text>
  <text class="block-small" x="750" y="1172" text-anchor="middle">Hold range bin r and array element m fixed while transforming</text>

  <path class="arrow" d="M 750 1188 L 750 1262"/>
  <rect class="data-box" x="270" y="1215" width="960" height="88" rx="10"/>
  <text class="data-title" x="750" y="1242" text-anchor="middle">Output / next input</text>
  <text class="data" x="750" y="1268" text-anchor="middle">range-Doppler-element cube: Z[r,d,m] <tspan class="math">∈ ℂ</tspan><tspan class="math-super" baseline-shift="super">1024×128×16</tspan>  (range bins × Doppler bins × elements)</text>
  <text class="data-small" x="750" y="1290" text-anchor="middle">Example: Target A near +30 m/s; Target B near -10 m/s; velocity bin spacing approx 1.17 m/s</text>
  <path class="arrow" d="M 750 1303 L 750 1343"/>

  <!-- Block 4 -->
  <rect class="block" x="405" y="1345" width="690" height="108" rx="10"/>
  <text class="block-title" x="750" y="1383" text-anchor="middle">4. Angle Processing / Beamforming</text>
  <text class="block-small" x="750" y="1414" text-anchor="middle">process array-element axis m using steering vectors or spatial FFT</text>
  <text class="block-small" x="750" y="1437" text-anchor="middle">At each RD cell, compare the array snapshot with angle templates</text>

  <path class="arrow" d="M 750 1453 L 750 1527"/>
  <rect class="data-box" x="270" y="1480" width="960" height="88" rx="10"/>
  <text class="data-title" x="750" y="1507" text-anchor="middle">Output / next input</text>
  <text class="data" x="750" y="1533" text-anchor="middle">range-Doppler-angle power/statistic cube: P[r,d,θ] <tspan class="math">∈ ℝ</tspan><tspan class="math-super" baseline-shift="super">1024×128×Nθ</tspan></text>
  <text class="data-small" x="750" y="1555" text-anchor="middle">Example: Target A peak at (4 km, +30 m/s, +20 deg); Target B peak at (6.5 km, -10 m/s, -35 deg)</text>
  <path class="arrow" d="M 750 1568 L 750 1608"/>

  <!-- Block 5 -->
  <rect class="decision" x="405" y="1610" width="690" height="108" rx="10"/>
  <text class="block-title" x="750" y="1648" text-anchor="middle">5. Detection Statistic + CFAR Thresholding</text>
  <text class="block-small" x="750" y="1679" text-anchor="middle">test each CUT against a local adaptive threshold from training cells</text>
  <text class="block-small" x="750" y="1702" text-anchor="middle">Guard cells protect target leakage; design Pfa controls threshold scale</text>

  <path class="arrow" d="M 750 1718 L 750 1792"/>
  <rect class="data-box" x="270" y="1745" width="960" height="88" rx="10"/>
  <text class="data-title" x="750" y="1772" text-anchor="middle">Output / next input</text>
  <text class="data" x="750" y="1798" text-anchor="middle">CFAR products: binary mask M[r,d,theta], threshold Gamma[r,d,theta], noise estimate Nhat[r,d,theta]</text>
  <text class="data-small" x="750" y="1820" text-anchor="middle">Example: cells around each target cross threshold; adjacent 1s form connected blobs, not final target count</text>
  <path class="arrow" d="M 750 1833 L 750 1873"/>

  <!-- Block 6 -->
  <rect class="decision" x="405" y="1875" width="690" height="108" rx="10"/>
  <text class="block-title" x="750" y="1913" text-anchor="middle">6. Detection-List Postprocessing</text>
  <text class="block-small" x="750" y="1944" text-anchor="middle">connected components, local peak picking, merge/split rules, unresolved flags</text>
  <text class="block-small" x="750" y="1967" text-anchor="middle">Convert cell-level evidence into target-level candidate reports</text>

  <path class="arrow" d="M 750 1983 L 750 2057"/>
  <rect class="data-box" x="270" y="2010" width="960" height="96" rx="10"/>
  <text class="data-title" x="750" y="2037" text-anchor="middle">Output / next input</text>
  <text class="data" x="750" y="2063" text-anchor="middle">detection list: {range_m, velocity_mps, angle_deg, score, threshold, cluster_size, status}</text>
  <text class="data-small" x="750" y="2085" text-anchor="middle">Example: Det A = {4002 m, +30.5 m/s, +20 deg, score/Gamma = 8.5, resolved}</text>
  <path class="arrow" d="M 750 2106 L 750 2153"/>

  <!-- Block 7 -->
  <rect class="tracking" x="405" y="2155" width="690" height="108" rx="10"/>
  <text class="block-title" x="750" y="2193" text-anchor="middle">7. Tracking Across CPIs</text>
  <text class="block-small" x="750" y="2224" text-anchor="middle">associate detections, update track state, smooth estimates, predict next CPI</text>
  <text class="block-small" x="750" y="2247" text-anchor="middle">Uses detection confidence, measurement covariance, and ambiguous/unresolved flags</text>

  <path class="arrow" d="M 750 2263 L 750 2325"/>
  <rect class="final-box" x="270" y="2315" width="960" height="82" rx="10"/>
  <text class="data-title" x="750" y="2344" text-anchor="middle">Final output data</text>
  <text class="data" x="750" y="2370" text-anchor="middle">tracks: {track_id, state [R,v,theta,...], covariance, status, history}</text>
  <text class="data-small" x="750" y="2391" text-anchor="middle">Example: Track 7 follows Target A across CPIs near 4 km, +30 m/s, +20 deg</text>
</svg>
