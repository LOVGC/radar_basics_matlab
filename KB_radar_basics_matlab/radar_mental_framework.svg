<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1580" viewBox="0 0 1900 1580">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #475569; }
      .section-title { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #0f172a; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #334155; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 13.5px; fill: #475569; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 12.5px; fill: #64748b; }
      .card { fill: #ffffff; stroke: #334155; stroke-width: 2; }
      .source { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .cube { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.3; }
      .split { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; }
      .lane-range { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.2; }
      .lane-doppler { fill: #fffbeb; stroke: #d97706; stroke-width: 2.2; }
      .lane-angle { fill: #faf5ff; stroke: #9333ea; stroke-width: 2.2; }
      .step { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .result { fill: #f8fafc; stroke: #475569; stroke-width: 1.7; }
      .stat { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.3; }
      .detect { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.1; }
      .side { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .arrow { stroke: #1f2937; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrow-light { stroke: #64748b; stroke-width: 1.9; fill: none; marker-end: url(#arrow); }
      .guide { stroke: #94a3b8; stroke-width: 1.3; stroke-dasharray: 7 7; fill: none; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1580"/>

  <text class="title" x="950" y="50" text-anchor="middle">Radar DSP Mental Framework</text>
  <text class="subtitle" x="950" y="82" text-anchor="middle">One raw object, three processing dimensions, then detection and target reports</text>

  <!-- Source and cube stack -->
  <rect class="source" x="660" y="110" width="580" height="74" rx="10"/>
  <text class="label" x="950" y="140" text-anchor="middle">Physical Scene</text>
  <text class="text" x="950" y="164" text-anchor="middle">targets, clutter, jammer, thermal noise, RF impairments</text>

  <rect class="source" x="555" y="225" width="790" height="92" rx="10"/>
  <text class="label" x="950" y="257" text-anchor="middle">Single-Target Received Signal Model</text>
  <text class="text" x="950" y="282" text-anchor="middle">continuous-time equation, vector form, and data-cube form describe the same echo</text>
  <text class="tiny" x="950" y="302" text-anchor="middle">the model explains how delay, Doppler phase, and spatial phase enter the received signal</text>

  <rect class="cube" x="570" y="360" width="760" height="96" rx="12"/>
  <text class="section-title" x="950" y="394" text-anchor="middle">Radar Data Cube</text>
  <text class="text" x="950" y="421" text-anchor="middle">x[fast time, slow time, array element]</text>
  <text class="tiny" x="950" y="441" text-anchor="middle">the central working tensor for pulse-Doppler phased-array radar</text>

  <path class="arrow" d="M 950 184 L 950 216"/>
  <path class="arrow" d="M 950 317 L 950 350"/>

  <!-- Dimension split -->
  <rect class="split" x="170" y="505" width="1560" height="78" rx="12"/>
  <text class="section-title" x="950" y="536" text-anchor="middle">Read the same cube along three axes</text>
  <text class="text" x="950" y="563" text-anchor="middle">Each processing block is a projection / template match along one dimension, while the other dimensions are held or accumulated</text>
  <path class="arrow" d="M 950 456 L 950 495"/>

  <!-- Three processing lanes -->
  <rect class="lane-range" x="110" y="640" width="500" height="320" rx="14"/>
  <text class="section-title" x="360" y="678" text-anchor="middle">Fast Time</text>
  <text class="text" x="360" y="704" text-anchor="middle">range processing</text>

  <rect class="step" x="145" y="735" width="430" height="64" rx="8"/>
  <text class="label" x="360" y="761" text-anchor="middle">Matched Filter</text>
  <text class="small" x="360" y="783" text-anchor="middle">template = delayed transmit waveform</text>

  <rect class="step" x="145" y="825" width="430" height="64" rx="8"/>
  <text class="label" x="360" y="851" text-anchor="middle">Delay Peak</text>
  <text class="small" x="360" y="873" text-anchor="middle">delay maps to range: R = c tau / 2</text>

  <rect class="result" x="145" y="914" width="430" height="34" rx="8"/>
  <text class="small" x="360" y="936" text-anchor="middle">resolution: Delta R = c / (2B)</text>

  <rect class="lane-doppler" x="700" y="640" width="500" height="320" rx="14"/>
  <text class="section-title" x="950" y="678" text-anchor="middle">Slow Time</text>
  <text class="text" x="950" y="704" text-anchor="middle">Doppler processing</text>

  <rect class="step" x="735" y="735" width="430" height="64" rx="8"/>
  <text class="label" x="950" y="761" text-anchor="middle">Doppler FFT / MTI</text>
  <text class="small" x="950" y="783" text-anchor="middle">template = pulse-to-pulse sinusoid</text>

  <rect class="step" x="735" y="825" width="430" height="64" rx="8"/>
  <text class="label" x="950" y="851" text-anchor="middle">Phase Slope Peak</text>
  <text class="small" x="950" y="873" text-anchor="middle">Doppler maps to velocity: v = lambda fD / 2</text>

  <rect class="result" x="735" y="914" width="430" height="34" rx="8"/>
  <text class="small" x="950" y="936" text-anchor="middle">resolution: Delta v approx lambda / (2 CPI)</text>

  <rect class="lane-angle" x="1290" y="640" width="500" height="320" rx="14"/>
  <text class="section-title" x="1540" y="678" text-anchor="middle">Array Element</text>
  <text class="text" x="1540" y="704" text-anchor="middle">angle processing</text>

  <rect class="step" x="1325" y="735" width="430" height="64" rx="8"/>
  <text class="label" x="1540" y="761" text-anchor="middle">Beamforming / Spatial FFT</text>
  <text class="small" x="1540" y="783" text-anchor="middle">template = steering vector a(theta)</text>

  <rect class="step" x="1325" y="825" width="430" height="64" rx="8"/>
  <text class="label" x="1540" y="851" text-anchor="middle">Spatial Phase Peak</text>
  <text class="small" x="1540" y="873" text-anchor="middle">phase pattern maps to direction of arrival</text>

  <rect class="result" x="1325" y="914" width="430" height="34" rx="8"/>
  <text class="small" x="1540" y="936" text-anchor="middle">aperture controls resolution; d controls aliasing</text>

  <!-- Clean split arrows -->
  <path class="guide" d="M 360 583 L 360 630"/>
  <path class="guide" d="M 950 583 L 950 630"/>
  <path class="guide" d="M 1540 583 L 1540 630"/>
  <path class="arrow-light" d="M 360 583 L 360 630"/>
  <path class="arrow-light" d="M 950 583 L 950 630"/>
  <path class="arrow-light" d="M 1540 583 L 1540 630"/>

  <path class="arrow-light" d="M 360 799 L 360 815"/>
  <path class="arrow-light" d="M 360 889 L 360 904"/>
  <path class="arrow-light" d="M 950 799 L 950 815"/>
  <path class="arrow-light" d="M 950 889 L 950 904"/>
  <path class="arrow-light" d="M 1540 799 L 1540 815"/>
  <path class="arrow-light" d="M 1540 889 L 1540 904"/>

  <!-- Statistic tensor -->
  <rect class="stat" x="270" y="1035" width="1360" height="104" rx="14"/>
  <text class="section-title" x="950" y="1073" text-anchor="middle">Range-Doppler-Angle Statistic Tensor</text>
  <text class="text" x="950" y="1100" text-anchor="middle">s[range bin, Doppler bin, angle bin] = power, magnitude, likelihood, or another detection statistic</text>
  <text class="tiny" x="950" y="1121" text-anchor="middle">this is the map/cube where target candidates become visible as peaks</text>

  <path class="arrow" d="M 360 960 L 360 1025"/>
  <path class="arrow" d="M 950 960 L 950 1025"/>
  <path class="arrow" d="M 1540 960 L 1540 1025"/>

  <!-- Detection pipeline -->
  <rect class="detect" x="545" y="1205" width="810" height="76" rx="12"/>
  <text class="label" x="950" y="1235" text-anchor="middle">Detection</text>
  <text class="text" x="950" y="1260" text-anchor="middle">CFAR / thresholding / hypothesis test: compare statistic against a local or global threshold</text>

  <rect class="detect" x="600" y="1320" width="700" height="68" rx="12"/>
  <text class="label" x="950" y="1348" text-anchor="middle">Binary Mask Tensor</text>
  <text class="small" x="950" y="1370" text-anchor="middle">same shape as statistic tensor; 0 = no target, 1 = candidate cell</text>

  <rect class="detect" x="600" y="1420" width="700" height="68" rx="12"/>
  <text class="label" x="950" y="1448" text-anchor="middle">Post-Processing</text>
  <text class="small" x="950" y="1470" text-anchor="middle">connected components, clustering, local peak picking, duplicate suppression</text>

  <rect class="detect" x="600" y="1520" width="700" height="46" rx="12"/>
  <text class="label" x="950" y="1550" text-anchor="middle">Detection List: range, velocity, angle, statistic, SNR</text>

  <path class="arrow" d="M 950 1139 L 950 1195"/>
  <path class="arrow" d="M 950 1281 L 950 1310"/>
  <path class="arrow" d="M 950 1388 L 950 1410"/>
  <path class="arrow" d="M 950 1488 L 950 1510"/>

  <!-- Side panels: no crossing arrows, just reference notes -->
  <rect class="side" x="80" y="1190" width="390" height="300" rx="12"/>
  <text class="section-title" x="275" y="1225" text-anchor="middle">Unifying View</text>

  <rect class="step" x="110" y="1250" width="330" height="52" rx="8"/>
  <text class="label" x="275" y="1272" text-anchor="middle">Processing = Projection</text>
  <text class="tiny" x="275" y="1292" text-anchor="middle">match the data against a parameterized template</text>

  <text class="text" x="125" y="1335">Range: delayed waveform template</text>
  <text class="text" x="125" y="1365">Doppler: slow-time sinusoid template</text>
  <text class="text" x="125" y="1395">Angle: steering-vector template</text>
  <text class="text" x="125" y="1425">FFT: efficient projection onto uniform bins</text>
  <text class="text" x="125" y="1455">Zero padding: smoother display, not true resolution</text>

  <rect class="side" x="1430" y="1190" width="390" height="300" rx="12"/>
  <text class="section-title" x="1625" y="1225" text-anchor="middle">Design Levers</text>

  <rect class="step" x="1460" y="1250" width="150" height="52" rx="8"/>
  <text class="label" x="1535" y="1272" text-anchor="middle">Range</text>
  <text class="tiny" x="1535" y="1292" text-anchor="middle">bandwidth B</text>

  <rect class="step" x="1640" y="1250" width="150" height="52" rx="8"/>
  <text class="label" x="1715" y="1272" text-anchor="middle">Doppler</text>
  <text class="tiny" x="1715" y="1292" text-anchor="middle">CPI, PRF, Np</text>

  <rect class="step" x="1460" y="1320" width="150" height="52" rx="8"/>
  <text class="label" x="1535" y="1342" text-anchor="middle">Angle</text>
  <text class="tiny" x="1535" y="1362" text-anchor="middle">M, d, aperture</text>

  <rect class="step" x="1640" y="1320" width="150" height="52" rx="8"/>
  <text class="label" x="1715" y="1342" text-anchor="middle">Detection</text>
  <text class="tiny" x="1715" y="1362" text-anchor="middle">Pd / Pfa</text>

  <text class="text" x="1460" y="1415">Ambiguity: PRF and element spacing create wrap/alias limits</text>
  <text class="text" x="1460" y="1445">Robustness: clutter, jammer, multipath, RF/ADC effects</text>
  <text class="text" x="1460" y="1475">Adaptive methods need assumptions and training snapshots</text>
</svg>
